<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Register | Educational Portfolio</title>

  <style>
    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* ===== BACKGROUND ===== */
    body {
      background:
        linear-gradient(rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.25)),
        url("https://i.pinimg.com/1200x/b3/be/3a/b3be3a3d7253c5e0d796574cae5a3391.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== NAVBAR ===== */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 70px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #006080;
    }

    nav ul {
      list-style: none;
      display: flex;
      align-items: center;
    }

    nav ul li {
      margin-left: 30px;
    }

    nav ul li a {
      text-decoration: none;
      color: #006080;
      font-size: 16px;
      font-weight: bold;
    }

    .active {
      background: #00ace6;
      color: white !important;
      padding: 6px 16px;
      border-radius: 20px;
    }

    /* ===== MAIN SECTION ===== */
    .home {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    /* ===== CARD ===== */
    .card {
      background: white;
      padding: 40px;
      max-width: 450px;
      width: 95%;
      text-align: center;
      border-radius: 22px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }

    /* ===== TOGGLE ===== */
    .toggle-header {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .toggle-btn {
      font-size: 20px;
      font-weight: bold;
      background: none;
      border: none;
      color: #7a8b9b;
      cursor: pointer;
      padding: 8px 20px;
      border-radius: 30px;
    }

    .toggle-btn.active {
      color: #006080;
      background: #e6f7ff;
    }

    /* ===== FORM ===== */
    .form-container {
      display: block;
    }

    .hidden {
      display: none;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #006080;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #dde7ed;
      border-radius: 25px;
      font-size: 15px;
      outline: none;
      background: #ffffff;
    }

    .form-group input:focus {
      border-color: #00ace6;
    }

    .form-group input::placeholder {
      color: #a6bbc8;
    }

    /* ===== BUTTON ===== */
    .btn {
      text-decoration: none;
      padding: 14px 30px;
      border-radius: 25px;
      font-size: 15px;
      font-weight: bold;
      display: inline-block;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .btn-primary {
      background: #00ace6;
      color: white;
    }

    .btn-primary:hover {
      background: #0088b3;
    }

    /* ===== SWITCH ===== */
    .switch-text {
      margin-top: 20px;
      color: #334155;
      font-size: 14px;
    }

    .switch-link {
      color: #00ace6;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      margin-left: 5px;
    }

    .switch-link:hover {
      text-decoration: underline;
    }

    /* ===== FOOTER ===== */
    footer {
      background: #006080;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 14px;
      box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.2);
    }

    @media (max-width: 600px) {
      nav {
        padding: 15px 20px;
      }
      nav ul li {
        margin-left: 15px;
      }
      .logo {
        font-size: 20px;
      }
      .card {
        padding: 30px 25px;
      }
    }
  </style>
</head>

<body>

<nav>
  <div class="logo">Jenelyn Sunido</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="project.html">Project</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html" class="active">Logout</a></li>
  </ul>
</nav>

<section class="home">
  <div class="card">
    
    <div class="toggle-header">
      <button class="toggle-btn active" id="loginToggle">Login</button>
      <button class="toggle-btn" id="registerToggle">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="form-container">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="Enter username" required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <div class="switch-text">
        Don't have an account?
        <span class="switch-link" id="switchToRegister">Register</span>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="form-container hidden">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regFullName" placeholder="Enter full name" required>
        </div>
        
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="Enter email" required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
      </form>

      <div class="switch-text">
        Already have an account?
        <span class="switch-link" id="switchToLogin">Login</span>
      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 Student Portfolio | Jenelyn B. Sunido
</footer>

<script>
  const loginToggle = document.getElementById('loginToggle');
  const registerToggle = document.getElementById('registerToggle');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const switchToRegister = document.getElementById('switchToRegister');
  const switchToLogin = document.getElementById('switchToLogin');

  function showLogin() {
    loginForm.classList.remove('hidden');
    registerForm.classList.add('hidden');
    loginToggle.classList.add('active');
    registerToggle.classList.remove('active');
  }

  function showRegister() {
    registerForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
    registerToggle.classList.add('active');
    loginToggle.classList.remove('active');
  }

  loginToggle.addEventListener('click', showLogin);
  registerToggle.addEventListener('click', showRegister);
  switchToRegister.addEventListener('click', showRegister);
  switchToLogin.addEventListener('click', showLogin);

  function handleLogin(event) {
    event.preventDefault();
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!username || !password) {
      alert('Please enter username and password.');
      return;
    }
    
    alert('Login successful! Welcome, ' + username + '!');
    window.location.href = 'index.html';
  }

  function handleRegister(event) {
    event.preventDefault();
    
    const fullName = document.getElementById('regFullName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    
    if (!fullName || !email || !password) {
      alert('All fields are required.');
      return;
    }
    
    alert('Account created for ' + fullName + '! You can now log in.');
    
    document.getElementById('regFullName').value = '';
    document.getElementById('regEmail').value = '';
    document.getElementById('regPassword').value = '';
    
    showLogin();
  }
</script>

</body>
</html>
