<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Login · Register | Educational Portfolio</title>
  
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, Arial, Helvetica, sans-serif;
    }

    /* ===== BACKGROUND ===== */
    body {
      background:
        linear-gradient(rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.25)),
        url("https://i.pinimg.com/1200x/b3/be/3a/b3be3a3d7253c5e0d796574cae5a3391.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== NAVBAR (ORIGINAL) ===== */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 70px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(8px);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #006080;
    }

    nav ul {
      list-style: none;
      display: flex;
      align-items: center;
    }

    nav ul li {
      margin-left: 30px;
    }

    nav ul li a {
      text-decoration: none;
      color: #006080;
      font-size: 16px;
      font-weight: bold;
    }

    .active-auth {
      background: #00ace6;
      color: white !important;
      padding: 6px 14px;
      border-radius: 20px;
    }

    .active-auth:hover {
      background: #0088b3;
    }

    /* ===== MAIN SECTION ===== */
    .home {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    /* ===== AUTH CARD (ENHANCED, CONTROLLED WIDTH) ===== */
    .auth-card {
      background: white;
      padding: 30px 35px;
      max-width: 540px;        /* controlled width - hindi masyadong malapad */
      width: 95%;
      border-radius: 22px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      text-align: center;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.95);
    }

    /* header toggle */
    .auth-header {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
      border-bottom: 2px solid #e9f0f5;
      padding-bottom: 15px;
    }

    .auth-toggle {
      font-size: 22px;
      font-weight: 700;
      background: transparent;
      border: none;
      color: #7a8b9b;
      cursor: pointer;
      padding: 6px 20px;
      transition: all 0.25s;
      border-radius: 60px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .auth-toggle i {
      font-size: 18px;
    }

    .auth-toggle.active {
      color: #006080;
      background: #e6f7ff;
    }

    .auth-toggle:hover {
      color: #004d66;
      background: #ecf7fd;
    }

    /* form containers */
    .form-container {
      display: block;
      width: 100%;
    }

    .hidden-form {
      display: none;
    }

    /* ===== FORM STYLING ===== */
    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .form-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 7px;
      font-weight: 600;
      color: #035c7c;
      font-size: 14px;
    }

    .password-wrapper {
      position: relative;
      width: 100%;
    }

    .password-wrapper input {
      width: 100%;
      padding: 12px 45px 12px 18px;
      border: 2px solid #dde7ed;
      border-radius: 20px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      background: #ffffff;
    }

    .form-group input {
      width: 100%;
      padding: 12px 18px;
      border: 2px solid #dde7ed;
      border-radius: 20px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      background: #ffffff;
    }

    .form-group input:focus,
    .password-wrapper input:focus {
      border-color: #00ace6;
      box-shadow: 0 4px 12px rgba(0, 172, 230, 0.1);
    }

    .form-group input::placeholder,
    .password-wrapper input::placeholder {
      color: #a6bbc8;
      font-size: 14px;
    }

    /* SVG eye icon */
    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      user-select: none;
      color: #006080;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: transparent;
    }

    .toggle-password:hover {
      background: #e6f2f9;
      color: #0088b3;
    }

    .eye-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* options row */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 20px;
      font-size: 14px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e3b4d;
      font-weight: 500;
    }

    .remember input {
      accent-color: #00ace6;
      width: 16px;
      height: 16px;
    }

    .forgot-link {
      color: #006080;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1.5px dotted #00ace6;
      font-size: 14px;
    }

    .forgot-link:hover {
      color: #003d4d;
      border-bottom-style: solid;
    }

    .auth-btn {
      width: 100%;
      padding: 14px 20px;
      background: #00ace6;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .auth-btn:hover {
      background: #0088b3;
      transform: translateY(-2px);
    }

    /* ----- GOOGLE AUTH BUTTON ----- */
    .google-auth-btn {
      width: 100%;
      padding: 12px 20px;
      background: white;
      color: #3c4043;
      border: 1.5px solid #dadce0;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .google-auth-btn:hover {
      background: #f8f9fa;
      border-color: #00ace6;
      box-shadow: 0 4px 12px rgba(0,172,230,0.15);
      transform: translateY(-1px);
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    /* switch prompt */
    .switch-prompt {
      text-align: center;
      color: #345f72;
      font-size: 14px;
      font-weight: 500;
    }

    .switch-link {
      color: #006080;
      font-weight: 700;
      text-decoration: none;
      margin-left: 6px;
      cursor: pointer;
      border-bottom: 2px solid #b0d9eb;
      padding-bottom: 2px;
    }

    .switch-link:hover {
      color: #003d5c;
      border-bottom-color: #00ace6;
    }

    .terms-link {
      color: #006080;
      font-weight: 600;
      text-decoration: none;
      font-size: 13px;
    }

    .terms-link:hover {
      text-decoration: underline;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #7a8b9b;
      font-size: 13px;
      margin: 5px 0 15px;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #d0dde8;
    }
    .auth-divider::before {
      margin-right: 12px;
    }
    .auth-divider::after {
      margin-left: 12px;
    }

    /* ===== FOOTER (ORIGINAL) ===== */
    footer {
      background: #006080;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 14px;
      box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.2);
    }

    /* responsive */
    @media (max-width: 600px) {
      nav {
        padding: 15px 20px;
      }
      nav ul li {
        margin-left: 15px;
      }
      .logo {
        font-size: 20px;
      }
      .auth-card {
        padding: 25px 22px;
        max-width: 460px;
      }
    }
  </style>
</head>

<body>

<!-- ===== NAVBAR (ORIGINAL - WALANG BINAGO) ===== -->
<nav>
  <div class="logo">Jenelyn Sunido</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="project.html">Project</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html" class="active-auth">Logout</a></li>
  </ul>
</nav>

<!-- ===== MAIN ===== -->
<section class="home">
  <div class="auth-card">

    <!-- toggle -->
    <div class="auth-header">
      <button class="auth-toggle active" id="toggleLogin"><i class="fas fa-sign-in-alt"></i> Login</button>
      <button class="auth-toggle" id="toggleRegister"><i class="fas fa-user-plus"></i> Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginFormContainer" class="form-container">
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email or Username</label>
          <input type="text" id="loginIdentifier" placeholder="Enter your email or username" autocomplete="email" required>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
            <span class="toggle-password" onclick="togglePassword('loginPassword', this)">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none">
                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="form-options">
          <label class="remember">
            <input type="checkbox" checked> Remember me
          </label>
          <a href="#" class="forgot-link" onclick="alert('📬 Password reset link has been sent to your email (demo)'); return false;">Forgot password?</a>
        </div>

        <button type="submit" class="auth-btn"><i class="fas fa-arrow-right"></i> Log in</button>

        <!-- GOOGLE LOGIN BUTTON -->
        <button type="button" class="google-auth-btn" id="googleLoginBtn">
          <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
          </svg>
          Continue with Google
        </button>

        <div class="auth-divider">or</div>

        <div class="switch-prompt">
          New here? 
          <span class="switch-link" id="switchToRegisterFromLogin">Create account</span>
        </div>
      </form>
    </div>

    <!-- REGISTER FORM (hidden) -->
    <div id="registerFormContainer" class="form-container hidden-form">
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Full name</label>
          <input type="text" id="regFullName" placeholder="Enter your name" autocomplete="name" required>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email address</label>
          <input type="email" id="regEmail" placeholder="Enter your email" autocomplete="email" required>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-key"></i> Password</label>
          <div class="password-wrapper">
            <input type="password" id="regPassword" placeholder="At least 6 characters" minlength="6" autocomplete="new-password" required>
            <span class="toggle-password" onclick="togglePassword('regPassword', this)">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none">
                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </span>
          </div>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-check-circle"></i> Confirm password</label>
          <div class="password-wrapper">
            <input type="password" id="regConfirmPassword" placeholder="Re-enter password" minlength="6" autocomplete="new-password" required>
            <span class="toggle-password" onclick="togglePassword('regConfirmPassword', this)">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none">
                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="form-options" style="justify-content: flex-start;">
          <label class="remember">
            <input type="checkbox" required> I agree to the 
            <a href="#" class="terms-link" onclick="alert('Terms of Service — educational portfolio demo'); return false;">Terms</a> 
            & 
            <a href="#" class="terms-link" onclick="alert('Privacy policy — demo'); return false;">Privacy</a>
          </label>
        </div>

        <button type="submit" class="auth-btn"><i class="fas fa-user-check"></i> Create account</button>

        <!-- GOOGLE SIGN-UP BUTTON -->
        <button type="button" class="google-auth-btn" id="googleRegisterBtn">
          <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
          </svg>
          Sign up with Google
        </button>

        <div class="auth-divider">or</div>

        <div class="switch-prompt">
          Already a member? 
          <span class="switch-link" id="switchToLoginFromRegister">Sign in</span>
        </div>
      </form>
    </div>

  </div>
</section>

<footer>

</footer>

<script>
  // ----- GOOGLE IDENTITY SERVICES (REAL ACCOUNT CHOOSER) -----
  function initializeGoogleAuth() {
    if (window.google && google.accounts) {
      // Login button
      const googleLoginBtn = document.getElementById('googleLoginBtn');
      if (googleLoginBtn) {
        googleLoginBtn.addEventListener('click', () => {
          const client = google.accounts.oauth2.initTokenClient({
            client_id: '606698049245-7k1q9d1q6p5vq2qj3v2qj3v2qj3v2qj.apps.googleusercontent.com',
            scope: 'email profile openid',
            callback: (tokenResponse) => {
              if (tokenResponse.error) {
                alert('Google Sign-In cancelled or failed.');
                return;
              }
              fetch(`https://www.googleapis.com/oauth2/v3/userinfo?access_token=${tokenResponse.access_token}`)
                .then(res => res.json())
                .then(data => {
                  const email = data.email || 'user@gmail.com';
                  const name = data.name || email.split('@')[0];
                  alert(`✅ Google Sign-In successful!\nWelcome, ${name} (${email})\nRedirecting to home...`);
                  window.location.href = 'index.html';
                })
                .catch(() => {
                  alert('✅ Authenticated with Google!\nRedirecting to home page...');
                  window.location.href = 'index.html';
                });
            },
            error_callback: (error) => {
              console.error('Google auth error:', error);
              alert('Google Sign-In failed. Try again.');
            }
          });
          client.requestAccessToken();
        });
      }
      
      // Register button (Google sign-up)
      const googleRegBtn = document.getElementById('googleRegisterBtn');
      if (googleRegBtn) {
        googleRegBtn.addEventListener('click', () => {
          const client = google.accounts.oauth2.initTokenClient({
            client_id: '606698049245-7k1q9d1q6p5vq2qj3v2qj3v2qj3v2qj.apps.googleusercontent.com',
            scope: 'email profile openid',
            callback: (tokenResponse) => {
              if (tokenResponse.error) {
                alert('Google Sign-Up cancelled.');
                return;
              }
              fetch(`https://www.googleapis.com/oauth2/v3/userinfo?access_token=${tokenResponse.access_token}`)
                .then(res => res.json())
                .then(data => {
                  const email = data.email || '';
                  const name = data.name || '';
                  if (email) {
                    document.getElementById('regEmail').value = email;
                    document.getElementById('regFullName').value = name || email.split('@')[0];
                  }
                  showLoginPanel();
                  document.getElementById('loginIdentifier').value = email;
                  alert(`🎉 Google account linked!\nWelcome, ${name || email}. You can now log in.`);
                })
                .catch(() => {
                  showLoginPanel();
                  alert('🎉 Google Sign-Up successful! You can now log in.');
                });
            },
          });
          client.requestAccessToken();
        });
      }
    } else {
      console.warn('Google Identity Services not loaded, using demo simulation.');
      document.getElementById('googleLoginBtn')?.addEventListener('click', () => {
        alert('🔐 Google Sign-In (simulated — GIS not fully loaded)\nIn production, real account chooser would appear.');
        window.location.href = 'index.html';
      });
      document.getElementById('googleRegisterBtn')?.addEventListener('click', () => {
        alert('📝 Google Sign-Up (simulated)');
        document.getElementById('regEmail').value = 'google.user@demo.com';
        document.getElementById('regFullName').value = 'Google Demo';
        showLoginPanel();
        document.getElementById('loginIdentifier').value = 'google.user@demo.com';
      });
    }
  }

  window.onload = function() {
    if (window.google) {
      initializeGoogleAuth();
    } else {
      setTimeout(initializeGoogleAuth, 800);
    }
  };

  // ----- PASSWORD TOGGLE (SVG eye) -----
  function togglePassword(inputId, eyeElement) {
    const passwordInput = document.getElementById(inputId);
    const svg = eyeElement.querySelector('svg');
    
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      svg.innerHTML = `
        <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
        <line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
      `;
      eyeElement.style.color = '#b0302a';
    } else {
      passwordInput.type = 'password';
      svg.innerHTML = `
        <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
      `;
      eyeElement.style.color = '#006080';
    }
  }

  // ----- TOGGLE LOGIC -----
  const toggleLoginBtn = document.getElementById('toggleLogin');
  const toggleRegisterBtn = document.getElementById('toggleRegister');
  const loginContainer = document.getElementById('loginFormContainer');
  const registerContainer = document.getElementById('registerFormContainer');
  const switchToReg = document.getElementById('switchToRegisterFromLogin');
  const switchToLogin = document.getElementById('switchToLoginFromRegister');

  function showLoginPanel() {
    loginContainer.classList.remove('hidden-form');
    registerContainer.classList.add('hidden-form');
    toggleLoginBtn.classList.add('active');
    toggleRegisterBtn.classList.remove('active');
  }

  function showRegisterPanel() {
    registerContainer.classList.remove('hidden-form');
    loginContainer.classList.add('hidden-form');
    toggleRegisterBtn.classList.add('active');
    toggleLoginBtn.classList.remove('active');
  }

  toggleLoginBtn.addEventListener('click', showLoginPanel);
  toggleRegisterBtn.addEventListener('click', showRegisterPanel);
  if (switchToReg) switchToReg.addEventListener('click', showRegisterPanel);
  if (switchToLogin) switchToLogin.addEventListener('click', showLoginPanel);

  // ----- LOGIN HANDLER -----
  window.handleLogin = function(event) {
    event.preventDefault();
    const identifier = document.getElementById('loginIdentifier').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!identifier || !password) {
      alert('❓ Please enter both email/username and password.');
      return;
    }
    
    alert(`✅ Welcome back, ${identifier.split('@')[0] || identifier}!\n(Login successful — redirecting to home page)`);
    window.location.href = 'index.html';
  };

  // ----- REGISTER HANDLER -----
  window.handleRegister = function(event) {
    event.preventDefault();
    
    const fullName = document.getElementById('regFullName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirmPassword').value;
    
    if (!fullName || !email || !password || !confirm) {
      alert('⚠️ All fields are required.');
      return;
    }
    
    if (password !== confirm) {
      alert('❌ Passwords do not match.');
      return;
    }
    
    if (password.length < 6) {
      alert('🔐 Password must be at least 6 characters.');
      return;
    }
    
    if (!email.includes('@') || !email.includes('.')) {
      alert('📧 Please enter a valid email address.');
      return;
    }
    
    alert(`🎉 Account created for ${fullName}!\nYou can now log in.`);
    
    document.getElementById('regFullName').value = '';
    document.getElementById('regEmail').value = '';
    document.getElementById('regPassword').value = '';
    document.getElementById('regConfirmPassword').value = '';
    
    document.getElementById('regPassword').type = 'password';
    document.getElementById('regConfirmPassword').type = 'password';
    
    const registerEyeIcons = document.querySelectorAll('#registerForm .toggle-password');
    registerEyeIcons.forEach(icon => {
      const svg = icon.querySelector('svg');
      if (svg) {
        svg.innerHTML = `
          <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        `;
      }
      icon.style.color = '#006080';
    });
    
    showLoginPanel();
    document.getElementById('loginIdentifier').value = email;
    
    document.getElementById('loginPassword').type = 'password';
    const loginEye = document.querySelector('#loginForm .toggle-password svg');
    if (loginEye) {
      loginEye.innerHTML = `
        <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
      `;
    }
    const loginEyeSpan = document.querySelector('#loginForm .toggle-password');
    if(loginEyeSpan) loginEyeSpan.style.color = '#006080';
  };

  window.logout = function() {
    alert("You have been logged out.");
  };
</script>

</body>
</html>
